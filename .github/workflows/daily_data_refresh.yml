name: Daily IPL Data Refresh

on:
  # 1:30 AM UTC = 7:00 AM IST — runs after Cricsheet publishes overnight match data
  schedule:
    - cron: '30 1 * * *'
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    env:
      LEAGUE_MC_ITERATIONS: '20'
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout with write access so we can push the updated data files
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # 2. Set up Python
      # -----------------------------------------------------------------------
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # -----------------------------------------------------------------------
      # 3. Install dependencies
      # -----------------------------------------------------------------------
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # -----------------------------------------------------------------------
      # 4. Run ingestion script
      #    Exit code 0 → new matches found (proceed to rebuild + commit)
      #    Exit code 2 → no new matches (skip commit)
      #    Exit code 1 → unexpected error (step will fail)
      # -----------------------------------------------------------------------
      - name: Run Cricsheet 2026 ingest
        id: ingest
        continue-on-error: true
        run: |
          python Code/ingest_cricsheet_2026.py || true

      # -----------------------------------------------------------------------
      # 5. Refresh Layer 3 availability / selection intel
      # -----------------------------------------------------------------------
      - name: Run Layer 3 intel pipeline
        continue-on-error: true
        run: |
          python Code/update_layer3_intel.py --limit 12 || true

      # -----------------------------------------------------------------------
      # 6. Rebuild dashboard payload
      # -----------------------------------------------------------------------
      - name: Rebuild dashboard data
        run: python Dashboard/build_dashboard_data.py

      # -----------------------------------------------------------------------
      # 7. Commit and push any changed data files
      # -----------------------------------------------------------------------
      - name: Commit updated data files
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          git add \
            Data/ipl_ball_by_ball.csv \
            "Data/ipl_json/" \
            Data/powerplay_batting_all_time.csv \
            Data/middle_batting_all_time.csv \
            Data/death_batting_all_time.csv \
            Data/powerplay_bowling_all_time.csv \
            Data/middle_bowling_all_time.csv \
            Data/death_bowling_all_time.csv \
            Data/powerplay_batting_active.csv \
            Data/middle_batting_active.csv \
            Data/death_batting_active.csv \
            Data/powerplay_bowling_active.csv \
            Data/middle_bowling_active.csv \
            Data/death_bowling_active.csv \
            Data/layer3_source_inbox_2026.json \
            Data/layer3_extracted_claims_2026.json \
            Data/team_availability_2026.json \
            Dashboard/data/dashboard_data.js

          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi

          git commit -m "Auto-refresh: IPL data and Layer 3 intel [skip ci]"
          git push
